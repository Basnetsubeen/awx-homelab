---
ansible_network_os: ios
ansible_connection: network_cli
ansible_become: true
ansible_become_method: enable
ansible_paramiko_host_key_auto_add: true
ansible_ssh_extra_args: '-o KexAlgorithms=+diffie-hellman-group1-sha1,diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa'
