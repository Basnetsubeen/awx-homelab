---
- name: Configure NTP on Cisco Switch
  hosts: CISCO-SW-01
  gather_facts: false
  connection: network_cli

  vars:
    ansible_network_os: ios
    ansible_user: admin
    ansible_become: true
    ansible_become_method: enable
    ansible_ssh_common_args: '-o KexAlgorithms=+diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa'

  tasks:

    - name: Configure NTP server
      cisco.ios.ios_config:
        lines:
          - ntp server pool.ntp.org

    - name: Save configuration
      cisco.ios.ios_config:
        save_when: always
